services:
  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file:
      - .env.production
      - ./backend/.env.production
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    ports:
      - "127.0.0.1:${BACKEND_PORT}:8000"

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:80"
