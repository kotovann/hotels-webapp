name: project check

on:
  workflow_call:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pswd
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      POSTGRES_DB: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pswd
      POSTGRES_PORT: 5432
      POSTGRES_HOST: localhost

      SECRET_KEY: super_ci_secret
      DEBUG: True
      ALLOWED_HOSTS: ""
      FRONTEND_URL: http://localhost:3000
      EMAIL_HOST: smtp.ci.com
      EMAIL_PORT: 587
      EMAIL_USE_TLS: True
      EMAIL_HOST_USER: ci@ci.com
      EMAIL_HOST_PASSWORD: ci_pswd
      DEFAULT_FROM_EMAIL: ci@ci.com

    steps:
      - name: Make checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: true

      - name: uv sync
        run: uv sync --locked --dev

      - name: Lint backend
        run: uv run ruff check .

      - name: Django check
        run: uv run python manage.py check

      - name: Check migrations
        run: uv run python manage.py makemigrations --check

      - name: Run migrations
        run: uv run python manage.py migrate --noinput

      - name: Run backend tests + coverage
        run: |
          uv run coverage run --source=. manage.py test
          uv run coverage xml -o coverage.xml
          uv run coverage report

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend

      - name: Check ST
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "-"
          else
            echo "+"
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
