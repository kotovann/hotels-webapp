name: project check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pswd
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      POSTGRES_DB: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pswd
      POSTGRES_PORT: 5432
      POSTGRES_HOST: db

      SECRET_KEY: super_ci_secret
      DEBUG: True
      ALLOWED_HOSTS: ""

    steps:
      - name: Make checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          enable-cache: true

      - name: uv sync
        working-directory: ./backend
        run: uv sync --locked --dev

      - name: Lint backend
        working-directory: ./backend
        run: uv run ruff check .

      - name: Django check
        working-directory: ./backend
        run: uv run python manage.py check

      - name: Check migrations
        working-directory: ./backend
        run: uv run python manage.py makemigrations --check

      - name: Run migrations
        working-directory: ./backend
        run: uv run python manage.py migrate --noinput