name: publish images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACK_IMAGE: ghcr.io/kotovann/hotels-backend
  FRONT_IMAGE: ghcr.io/kotovann/hotels-frontend

jobs:
  check:
    name: Run project checks
    uses: ./.github/workflows/check.yml
    secrets: inherit

  publish:
    name: Build and publish images
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: GH Container registry login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.production
          push: true
          tags: |
            ${{ env.BACK_IMAGE }}:production
            ${{ env.BACK_IMAGE }}:${{ github.sha }}

      - name: Build + push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.production
          push: true
          tags: |
            ${{ env.FRONT_IMAGE }}:production
            ${{ env.FRONT_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to server
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Install collections
        working-directory: deploy/ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Ansible Vault
        working-directory: deploy/ansible
        run: |
          printf '%s\n' "${{ secrets.ANS_VAULT_PASS }}" > vault_pswd
          chmod 600 vault_pswd

      - name: Run playbook
        working-directory: deploy/ansible
        env:
          ANSIBLE_LOCAL_TEMP: /tmp/ansible-local
          ANSIBLE_REMOTE_TEMP: /tmp/ansible-remote
        run: >
          ansible-playbook -i inventory.ini playbook.yml
          --vault-password-file vault_pswd
          --tags deploy
          -e backend_image=ghcr.io/kotovann/hotels-backend:production
          -e frontend_image=ghcr.io/kotovann/hotels-frontend:production
